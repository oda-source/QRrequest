<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QRコード依頼</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    body {
      background-color: #f8fafc;
      color: #1e293b;
      padding: 16px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ヘッダー */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #1e293b;
      color: #fff;
      padding: 12px 18px;
      border-radius: 8px;
    }

    .header-title h1 {
      font-size: 1.1rem;
      font-weight: bold;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .badge {
      font-size: 0.75rem;
      padding: 4px 8px;
      border-radius: 12px;
      font-weight: bold;
    }

    .badge-success { background-color: #10b981; color: #fff; }
    .badge-warning { background-color: #f59e0b; color: #fff; }

    /* フォームカード */
    .form-card, .history-card {
      background-color: #ffffff;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      border: 1px solid #e2e8f0;
    }

    .form-card h2, .history-header h3 {
      font-size: 1.1rem;
      font-weight: bold;
      color: #0f172a;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 2px solid #f1f5f9;
    }

    .form-group { margin-bottom: 14px; }

    .form-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: bold;
      color: #334155;
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid #cbd5e1;
      border-radius: 6px;
      font-size: 0.95rem;
      color: #0f172a;
      background-color: #f8fafc;
      transition: all 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #4f46e5;
      background-color: #ffffff;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }

    .form-text { font-size: 0.75rem; color: #64748b; margin-top: 4px; }

    /* 送信ボタン */
    .btn-submit {
      width: 100%;
      background-color: #4f46e5;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      padding: 12px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.3);
      transition: all 0.2s;
    }

    .btn-submit:hover { background-color: #4338ca; }
    .btn-submit:disabled { background-color: #94a3b8; cursor: not-allowed; }

    /* 履歴エリア（コンパクト横並び） */
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .btn-clear-history {
      background: none;
      border: none;
      color: #ef4444;
      font-size: 0.75rem;
      cursor: pointer;
      text-decoration: underline;
    }

    .history-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-height: 200px;
      overflow-y: auto;
      padding: 4px;
    }

    .course-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: bold;
      transition: all 0.2s;
    }

    /* 添付完了（緑） */
    .chip-attached {
      background-color: #d1fae5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }

    /* 未添付・依頼中（灰） */
    .chip-pending {
      background-color: #f1f5f9;
      color: #475569;
      border: 1px solid #cbd5e1;
    }

    .no-history {
      text-align: center;
      color: #94a3b8;
      font-size: 0.85rem;
      padding: 12px 0;
      width: 100%;
    }
  </style>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./client.js"></script>
</head>
<body>

  <div class="container">
    <!-- ヘッダー -->
    <header>
      <div class="header-title">
        <h1>QRコード依頼</h1>
      </div>
      <div class="header-controls">
        <span id="modeBadge" class="badge badge-warning">デモ</span>
      </div>
    </header>

    <!-- 入力フォーム -->
    <div class="form-card">
      <h2>新規QRコード発行依頼</h2>
      <form id="qrRequestForm">
        <div class="form-group">
          <label for="email">📧 依頼先メールアドレス</label>
          <input type="email" id="email" name="email" placeholder="example@company.com" required>
        </div>

        <div class="form-group">
          <label for="courseNumbers">🔢 コース番号</label>
          <textarea id="courseNumbers" name="courseNumbers" rows="2" placeholder="8K069, 2K189, 5K706" required></textarea>
          <div class="form-text">※複数の場合はコンマ(,)で区切って入力してください。</div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">依頼を送信する</button>
      </form>
    </div>

    <!-- 送信・チェック状況カード -->
    <div class="history-card">
      <div class="history-header">
        <h3 style="margin: 0; padding: 0; border: none;">📜 依頼済みコース照合状況</h3>
        <button class="btn-clear-history" onclick="clearHistory()">履歴をクリア</button>
      </div>
      <div id="historyChips" class="history-chips">
        <!-- 横並びのコースバッジが名前順で入ります -->
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      checkGasStatus();
      loadHistory();
    });

    function checkGasStatus() {
      const savedUrl = localStorage.getItem('gasWebApiUrl');
      const badge = document.getElementById('modeBadge');
      if (savedUrl) {
        badge.textContent = 'GAS連携中';
        badge.className = 'badge badge-success';
      } else {
        badge.textContent = '未連携';
        badge.className = 'badge badge-warning';
      }
    }

    /* 履歴＆添付自動照合機能 */
    function loadHistory() {
      const historyCourses = JSON.parse(localStorage.getItem('qrCourseList') || '[]');
      const container = document.getElementById('historyChips');

      if (historyCourses.length === 0) {
        container.innerHTML = '<div class="no-history">まだ依頼履歴はありません</div>';
        return;
      }

      // URLパラメータから添付ファイル一覧を取得
      const urlParams = new URLSearchParams(window.location.search);
      let attachments = [];
      try {
        attachments = JSON.parse(urlParams.get('attachments') || '[]');
      } catch(e) {
        attachments = [];
      }

      // 名前（アルファベット・数字）順にソート
      historyCourses.sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));

      // 照合レンダリング
      container.innerHTML = historyCourses.map(course => {
        // 添付ファイル名の中にコース番号が含まれているか判定 (例: "6K562.png" か "6K562")
        const isAttached = attachments.some(file => file.toUpperCase().includes(course.toUpperCase()));

        if (isAttached) {
          return `<span class="course-chip chip-attached">✅ ${course}</span>`;
        } else {
          return `<span class="course-chip chip-pending">⏳ ${course}</span>`;
        }
      }).join('');
    }

    function addHistoryCourses(courseStr) {
      let existingCourses = JSON.parse(localStorage.getItem('qrCourseList') || '[]');
      
      // カンマ区切りのコース番号を分解・整形
      const newCourses = courseStr.split(/[,、\s]+/)
        .map(c => c.trim())
        .filter(c => c.length > 0);

      // 重複を除外して統合
      newCourses.forEach(c => {
        if (!existingCourses.includes(c)) {
          existingCourses.push(c);
        }
      });

      localStorage.setItem('qrCourseList', JSON.stringify(existingCourses));
      loadHistory();
    }

    function clearHistory() {
      if (confirm('依頼履歴をクリアしますか？')) {
        localStorage.removeItem('qrCourseList');
        loadHistory();
      }
    }

    /* フォーム送信 */
    document.getElementById('qrRequestForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      const gasUrl = localStorage.getItem('gasWebApiUrl');

      if (!gasUrl) {
        alert('【エラー】GAS連携がされていません。\nTrelloメニューの「Power-Upの設定を編集」からURLを設定してください。');
        return;
      }

      const urlParams = new URLSearchParams(window.location.search);
      const targetUrl = urlParams.get('targetUrl') || '';
      const boardName = urlParams.get('boardName') || '';

      const email = document.getElementById('email').value;
      const courseNumbers = document.getElementById('courseNumbers').value;

      submitBtn.disabled = true;
      submitBtn.textContent = '送信中...';

      const data = {
        email: email,
        courseNumbers: courseNumbers,
        targetUrl: targetUrl,
        boardName: boardName
      };

      fetch(gasUrl, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      })
      .then(() => {
        alert('依頼が正常に送信されました！');
        addHistoryCourses(courseNumbers);
        document.getElementById('qrRequestForm').reset();
      })
      .catch(err => {
        console.error(err);
        alert('送信に失敗しました。');
      })
      .finally(() => {
        submitBtn.disabled = false;
        submitBtn.textContent = '依頼を送信する';
      });
    });
  </script>
</body>
</html>
